services:
  shape-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shape_meet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shape_meet}
      POSTGRES_DB: ${POSTGRES_DB:-shape_meet}
      TZ: America/Bogota
      PGTZ: America/Bogota
    volumes:
      - shape_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shape_meet} -d ${POSTGRES_DB:-shape_meet}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - shape-meet

  shape-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-shape_redis}", "--appendonly", "yes"]
    volumes:
      - shape_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-shape_redis}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - shape-meet

  shape-livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        log_level: info
        rtc:
          tcp_port: ${LIVEKIT_RTC_TCP_PORT:-7881}
          udp_port: ${LIVEKIT_RTC_UDP_PORT:-7882}
          use_external_ip: ${LIVEKIT_USE_EXTERNAL_IP:-true}
          node_ip: ${LIVEKIT_NODE_IP:-}
          enable_loopback_candidate: ${LIVEKIT_ENABLE_LOOPBACK_CANDIDATE:-false}
          stun_servers:
            - ${LIVEKIT_STUN_SERVER:-stun.l.google.com:19302}
          turn_servers:
            - host: ${LIVEKIT_TURN_DOMAIN:-turn.shape-meet.local}
              port: ${LIVEKIT_TURN_UDP_PORT:-3478}
              protocol: udp
              secret: ${LIVEKIT_TURN_SHARED_SECRET:-shape-turn-dev-secret}
              ttl: ${LIVEKIT_TURN_TTL_SECONDS:-14400}
            - host: ${LIVEKIT_TURN_DOMAIN:-turn.shape-meet.local}
              port: ${LIVEKIT_TURN_UDP_PORT:-3478}
              protocol: tcp
              secret: ${LIVEKIT_TURN_SHARED_SECRET:-shape-turn-dev-secret}
              ttl: ${LIVEKIT_TURN_TTL_SECONDS:-14400}
            - host: ${LIVEKIT_TURN_DOMAIN:-turn.shape-meet.local}
              port: ${LIVEKIT_TURN_TLS_PORT:-5349}
              protocol: tls
              secret: ${LIVEKIT_TURN_SHARED_SECRET:-shape-turn-dev-secret}
              ttl: ${LIVEKIT_TURN_TTL_SECONDS:-14400}
        redis:
          address: shape-redis:6379
          password: ${REDIS_PASSWORD:-shape_redis}
        keys:
          "${LIVEKIT_API_KEY:-devkey}": "${LIVEKIT_API_SECRET:-secret}"
        turn:
          enabled: false
    ports:
      - "${LIVEKIT_HTTP_PORT:-7880}:7880/tcp"
      - "${LIVEKIT_RTC_TCP_PORT:-7881}:${LIVEKIT_RTC_TCP_PORT:-7881}/tcp"
      - "${LIVEKIT_RTC_UDP_PORT:-7882}:${LIVEKIT_RTC_UDP_PORT:-7882}/udp"
    depends_on:
      shape-redis:
        condition: service_healthy
      shape-turn:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:7880 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - shape-meet

  shape-turn:
    image: coturn/coturn:latest
    restart: unless-stopped
    command:
      - --log-file=stdout
      - --fingerprint
      - --use-auth-secret
      - --static-auth-secret=${LIVEKIT_TURN_SHARED_SECRET:-shape-turn-dev-secret}
      - --realm=${LIVEKIT_TURN_REALM:-shape-meet}
      - --external-ip=${LIVEKIT_TURN_EXTERNAL_IP:-127.0.0.1}
      - --listening-port=${LIVEKIT_TURN_UDP_PORT:-3478}
      - --tls-listening-port=${LIVEKIT_TURN_TLS_PORT:-5349}
      - --min-port=${LIVEKIT_TURN_RELAY_RANGE_START:-30000}
      - --max-port=${LIVEKIT_TURN_RELAY_RANGE_END:-30100}
      - --no-multicast-peers
      - --stale-nonce=600
    ports:
      - "${LIVEKIT_TURN_UDP_PORT:-3478}:${LIVEKIT_TURN_UDP_PORT:-3478}/udp"
      - "${LIVEKIT_TURN_UDP_PORT:-3478}:${LIVEKIT_TURN_UDP_PORT:-3478}/tcp"
      - "${LIVEKIT_TURN_TLS_PORT:-5349}:${LIVEKIT_TURN_TLS_PORT:-5349}/tcp"
      - "${LIVEKIT_TURN_TLS_PORT:-5349}:${LIVEKIT_TURN_TLS_PORT:-5349}/udp"
      - "${LIVEKIT_TURN_RELAY_RANGE_START:-30000}-${LIVEKIT_TURN_RELAY_RANGE_END:-30100}:${LIVEKIT_TURN_RELAY_RANGE_START:-30000}-${LIVEKIT_TURN_RELAY_RANGE_END:-30100}/udp"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 turnutils_uclient -t -W ${LIVEKIT_TURN_SHARED_SECRET:-shape-turn-dev-secret} -n 1 -m 1 -y -p ${LIVEKIT_TURN_UDP_PORT:-3478} 127.0.0.1 >/tmp/shape-turn-health.log 2>&1 || true; grep -q 'Total connect time' /tmp/shape-turn-health.log"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 10s
    networks:
      - shape-meet

  shape-admin:
    build:
      context: ${SHAPE_ADMIN_BUILD_CONTEXT:-..}
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-shape_meet}:${POSTGRES_PASSWORD:-shape_meet}@shape-postgres:5432/${POSTGRES_DB:-shape_meet}?schema=public
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-change-me}
      LIVEKIT_URL: ${LIVEKIT_URL:-wss://livekit.shape-meet.local}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://admin.shape-meet.local}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      RUN_SEED: ${RUN_SEED:-false}
      SHAPE_DEBUG_ERRORS: ${SHAPE_DEBUG_ERRORS:-false}
      HOST_BOOTSTRAP_EMAIL: ${HOST_BOOTSTRAP_EMAIL:-admin@shape.test}
      HOST_BOOTSTRAP_PASSWORD: ${HOST_BOOTSTRAP_PASSWORD:-ChangeMe123!}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ORG: ${SENTRY_ORG:-}
      SENTRY_PROJECT: ${SENTRY_PROJECT:-}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${NEXT_PUBLIC_SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-shape-meet-admin@0.1.0}
      NEXT_PUBLIC_SENTRY_RELEASE: ${NEXT_PUBLIC_SENTRY_RELEASE:-shape-meet-admin@0.1.0}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-1.0}
      NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE:-1.0}
      SENTRY_DEBUG: ${SENTRY_DEBUG:-false}
      NEXT_PUBLIC_SENTRY_DEBUG: ${NEXT_PUBLIC_SENTRY_DEBUG:-false}
      SHAPE_ARTIFACT_STORAGE_DIR: ${SHAPE_ARTIFACT_STORAGE_DIR:-/app/artifacts}
      SHAPE_ARTIFACT_MAX_BYTES: ${SHAPE_ARTIFACT_MAX_BYTES:-2147483648}
    depends_on:
      shape-postgres:
        condition: service_healthy
      shape-livekit:
        condition: service_healthy
    volumes:
      - shape_artifacts_data:/app/artifacts
    ports:
      - "${ADMIN_HTTP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - shape-meet

volumes:
  shape_postgres_data:
  shape_redis_data:
  shape_artifacts_data:

networks:
  shape-meet:
    driver: bridge
