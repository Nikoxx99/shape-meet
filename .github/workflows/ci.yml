name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate monorepo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build workspaces
        run: pnpm -r --if-present build

      - name: Check Tauri Rust crate
        run: pnpm check:native

      - name: Check AI sidecar syntax
        run: python3 -m py_compile apps/ai-sidecar/server.py

      - name: Build AI sidecar package smoke
        run: pnpm build:ai-sidecar

      - name: Smoke AI sidecar adapter contract
        run: pnpm smoke:ai-contract

      - name: Smoke AI managed processors
        run: pnpm smoke:ai-managed

      - name: Smoke AI command adapters
        run: pnpm smoke:ai-command

      - name: Validate Coolify compose
        run: pnpm check:coolify infra/env.coolify.example
